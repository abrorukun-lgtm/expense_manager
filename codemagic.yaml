workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_signing
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Setup Keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/smartcv.p12
      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --android-skip-build-dependency-validation
    artifacts:
      - build/**/outputs/**/*.aab